name: Release

# Builds Notepad for macOS, Windows and Linux and attaches the packaged
# artifacts to a GitHub Release. Triggered by pushing a tag like `v1.0.0`,
# or run manually (workflow_dispatch) to just produce build artifacts.
#
# NOTE: authored on macOS and not run on CI yet — CI workflows usually need a
# tweak or two on the first run (Qt module names, deploy flags, etc.).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  QT_VERSION: '6.8.1'

jobs:
  # ----------------------------------------------------------------- macOS
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true

      - name: Configure & build
        # Ad-hoc signing (`-`): a real signed/notarized release needs an Apple
        # Developer ID via secrets; ad-hoc lets the build succeed in CI.
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DNOTEPAD_SIGN_IDENTITY=-
          cmake --build build

      - name: Deploy Qt & package
        run: |
          macdeployqt build/Notepad.app -verbose=1
          ditto -c -k --keepParent build/Notepad.app Notepad-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Notepad-macos
          path: Notepad-macos.zip

  # ----------------------------------------------------------------- Windows
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          cache: true

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure & build
        # Ninja + MSVC env is more reliable than CMake's VS-generator detection.
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Deploy Qt & package
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist | Out-Null
          Copy-Item build/Notepad.exe dist/
          Copy-Item build/NoteThumbnail.dll dist/
          windeployqt --release --dir dist dist/Notepad.exe
          Compress-Archive -Path dist/* -DestinationPath Notepad-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Notepad-windows
          path: Notepad-windows.zip

  # ----------------------------------------------------------------- Linux
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev libxkbcommon-dev \
                                  imagemagick file fuse

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true

      - name: Configure & build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build

      - name: Stage AppDir
        run: |
          DESTDIR="$PWD/AppDir" cmake --install build
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          convert -size 256x256 xc:'#2d5fa0' -fill white -gravity center \
                  -pointsize 150 -annotate 0 'N' \
                  AppDir/usr/share/icons/hicolor/256x256/apps/notepad.png

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage \
            --desktop-file AppDir/usr/share/applications/notepad.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/notepad.png \
            --executable AppDir/usr/bin/Notepad
          mv Notepad*.AppImage Notepad-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: Notepad-linux
          path: Notepad-linux-x86_64.AppImage

  # ----------------------------------------------------------------- Release
  release:
    needs: [macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
